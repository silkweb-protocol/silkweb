# SilkWeb Nginx Configuration
# Coexists with existing services on the VPS
#
# Routes:
#   silkweb.io          → landing page (static files)
#   api.silkweb.io      → FastAPI on :8000
#   *.other domains     → Express on :3001 (unchanged)

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_register:10m rate=2r/s;
limit_req_zone $binary_remote_addr zone=api_discover:10m rate=10r/s;

# Upstream for SilkWeb API
upstream silkweb_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ─── Redirect HTTP → HTTPS (all SilkWeb domains) ───
server {
    listen 80;
    server_name silkweb.io www.silkweb.io api.silkweb.io;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── silkweb.io — Landing Page (static) ───
server {
    listen 443 ssl http2;
    server_name silkweb.io www.silkweb.io;

    # SSL — Let's Encrypt (certbot will fill these)
    ssl_certificate /etc/letsencrypt/live/silkweb.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/silkweb.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Static files
    root /var/www/silkweb;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(svg|png|ico|jpg|jpeg|gif|webp|css|js|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ─── api.silkweb.io — FastAPI Backend ───
server {
    listen 443 ssl http2;
    server_name api.silkweb.io;

    # SSL — Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/silkweb.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/silkweb.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Request size limit (matches FastAPI config)
    client_max_body_size 1m;

    # Rate limiting at Nginx level (backup to Redis rate limiter)
    location /api/v1/agents {
        limit_req zone=api_register burst=5 nodelay;
        proxy_pass http://silkweb_api;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    location /api/v1/discover {
        limit_req zone=api_discover burst=20 nodelay;
        proxy_pass http://silkweb_api;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    location / {
        limit_req zone=api_general burst=50 nodelay;
        proxy_pass http://silkweb_api;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # Block common attack paths
    location ~ /\. {
        deny all;
    }
    location ~* (wp-admin|wp-login|xmlrpc|phpmyadmin) {
        return 444;
    }
}
