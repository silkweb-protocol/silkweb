<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SilkWeb Brain</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; }
  #brain { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; z-index: 0; }
</style>
</head>
<body>
<div id="brain"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.halo.min.js"></script>
<script>
let currentState = 'idle';
let baseSize = 1.5;
let baseAmplitude = 1.5;

const effect = VANTA.HALO({
  el: '#brain',
  mouseControls: true,
  touchControls: true,
  gyroControls: false,
  minHeight: 200.00,
  minWidth: 200.00,
  backgroundColor: 0x000000,
  baseColor: 0x1a5a8a,
  size: baseSize,
  amplitudeFactor: baseAmplitude,
  xOffset: 0,
  yOffset: 0,
});

// Speaking animation — pulsing size and amplitude
let pulseFrame = null;
let pulseTime = 0;

function animateSpeaking() {
  pulseTime += 0.03;
  const sizePulse = baseSize + Math.sin(pulseTime * 2) * 0.3;
  const ampPulse = baseAmplitude + Math.sin(pulseTime * 1.5) * 0.4;
  effect.setOptions({
    size: sizePulse,
    amplitudeFactor: ampPulse
  });
  if (currentState === 'speaking') {
    pulseFrame = requestAnimationFrame(animateSpeaking);
  }
}

function animateThinking() {
  pulseTime += 0.02;
  const sizePulse = baseSize + Math.sin(pulseTime * 4) * 0.15;
  const ampPulse = baseAmplitude + Math.cos(pulseTime * 3) * 0.2;
  effect.setOptions({
    size: sizePulse,
    amplitudeFactor: ampPulse
  });
  if (currentState === 'thinking') {
    pulseFrame = requestAnimationFrame(animateThinking);
  }
}

function animateListening() {
  pulseTime += 0.015;
  const sizePulse = baseSize * 0.9 + Math.sin(pulseTime) * 0.05;
  effect.setOptions({
    size: sizePulse,
    amplitudeFactor: baseAmplitude * 0.8
  });
  if (currentState === 'listening') {
    pulseFrame = requestAnimationFrame(animateListening);
  }
}

// Public API
window.triggerPulse = function() {
  const origSize = effect.options.size;
  effect.setOptions({ size: baseSize * 2.5, amplitudeFactor: baseAmplitude * 2 });
  setTimeout(() => {
    effect.setOptions({ size: baseSize * 1.8, amplitudeFactor: baseAmplitude * 1.5 });
  }, 100);
  setTimeout(() => {
    effect.setOptions({ size: baseSize * 1.3, amplitudeFactor: baseAmplitude * 1.2 });
  }, 250);
  setTimeout(() => {
    effect.setOptions({ size: baseSize, amplitudeFactor: baseAmplitude });
  }, 500);
};

window.setBrainState = function(state) {
  if (pulseFrame) {
    cancelAnimationFrame(pulseFrame);
    pulseFrame = null;
  }
  currentState = state;
  pulseTime = 0;

  switch(state) {
    case 'speaking':
      baseSize = 1.8;
      baseAmplitude = 1.8;
      effect.setOptions({ baseColor: 0x2a7aaa });
      animateSpeaking();
      break;
    case 'thinking':
      baseSize = 1.3;
      baseAmplitude = 2.0;
      effect.setOptions({ baseColor: 0x1a6a9a });
      animateThinking();
      break;
    case 'listening':
      baseSize = 1.0;
      baseAmplitude = 1.0;
      effect.setOptions({ baseColor: 0x155a85 });
      animateListening();
      break;
    default: // idle
      baseSize = 1.5;
      baseAmplitude = 1.5;
      effect.setOptions({
        baseColor: 0x1a5a8a,
        size: baseSize,
        amplitudeFactor: baseAmplitude
      });
  }
};

window.setBrainColor = function(hex) {
  const num = parseInt(hex.replace('#',''), 16);
  effect.setOptions({ baseColor: num });
};

// Subtle idle breathing
let idleTime = 0;
function idleBreathing() {
  if (currentState === 'idle') {
    idleTime += 0.005;
    const breath = 1.5 + Math.sin(idleTime) * 0.1;
    effect.setOptions({ size: breath });
  }
  requestAnimationFrame(idleBreathing);
}
idleBreathing();
</script>
</body>
</html>
