<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--agent:#3B82F6;--agent-dark:#1E3A5F;--bg:#000;--white:#fff;--gray-300:#cbd5e1;--gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;--gray-800:#1e293b;--border:rgba(255,255,255,0.06);--glass:rgba(255,255,255,0.03);--glass-hover:rgba(255,255,255,0.06)}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--white);overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0 48px;height:64px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.8);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.nav-logo{font-size:20px;font-weight:700;color:var(--white);text-decoration:none;display:flex;align-items:center;gap:10px}
.nav-logo .logo-mark{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#4f46e5,#7c3aed);display:flex;align-items:center;justify-content:center}
.nav-logo .logo-mark svg{width:20px;height:20px}
.nav-links{display:flex;align-items:center;gap:28px}
.nav-links a{color:var(--gray-400);text-decoration:none;font-size:14px;font-weight:500;transition:color .3s}
.nav-links a:hover{color:var(--white)}

/* BRAIN SECTION — clean Vanta only */
.brain-section{position:relative;width:100%;height:50vh;min-height:400px;overflow:hidden}
.brain-pulse-overlay{position:absolute;inset:0;z-index:5;pointer-events:none;opacity:0;transition:opacity 0.3s;background:radial-gradient(circle at 50% 50%, rgba(34,102,170,0.3) 0%, transparent 60%)}
.brain-pulse-overlay.speaking{opacity:1;animation:brainPulseGlow 0.8s ease-in-out infinite}
.brain-pulse-overlay.thinking{opacity:1;animation:brainPulseGlow 0.3s ease-in-out infinite}
@keyframes brainPulseGlow{0%,100%{opacity:0.2;transform:scale(1)}50%{opacity:0.6;transform:scale(1.05)}}
.brain-name-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;pointer-events:none;padding-top:64px;gap:8px}
.brain-agent-name{font-size:24px;font-weight:800;color:var(--white);letter-spacing:-0.5px}
.brain-agent-domain{font-size:14px;color:var(--gray-400);font-weight:500}
.brain-name-label{font-size:20px;font-weight:600;color:rgba(255,255,255,0.5);letter-spacing:2px;text-transform:uppercase}

/* AGENT INFO SECTION */
.agent-info-section{padding:40px 24px 32px;background:linear-gradient(180deg, rgba(10,10,20,1) 0%, rgba(0,0,0,1) 100%)}
.agent-info-inner{max-width:800px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:14px}
.agent-identity{display:flex;align-items:center;gap:16px}
.agent-orb{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg, var(--agent-dark), var(--agent));box-shadow:0 0 30px var(--agent),0 0 60px #3B82F640;animation:orbPulse 3s ease-in-out infinite;flex-shrink:0}
@keyframes orbPulse{0%,100%{box-shadow:0 0 30px var(--agent),0 0 60px #3B82F640}50%{box-shadow:0 0 50px var(--agent),0 0 100px #3B82F660}}
.agent-name{font-size:28px;font-weight:800;letter-spacing:-0.5px}
.agent-domain{font-size:16px;color:var(--gray-400)}
.agent-rating{display:flex;align-items:center;gap:8px}
.star{display:inline-block}.star-filled{color:#F59E0B}.star-empty{color:#374151}
.rating-num{font-size:15px;font-weight:700;color:var(--gray-300)}
.rating-count{font-size:13px;color:var(--gray-500)}
.agent-badges{display:flex;gap:10px}
.badge{padding:5px 14px;border-radius:100px;font-size:12px;font-weight:600}
.badge-mem{background:transparent;border:1px solid #3B82F650;color:var(--agent)}
.badge-tier-expert{background:rgba(99,102,241,.15);color:#818cf8;border:1px solid rgba(99,102,241,.25)}
.badge-tier-authority{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.25)}
.greeting-text{font-size:16px;color:var(--gray-300);max-width:500px;text-align:center;line-height:1.6;min-height:52px}
.typing-cursor{display:inline-block;width:2px;height:18px;background:var(--agent);margin-left:2px;animation:blink .8s step-end infinite;vertical-align:text-bottom}
@keyframes blink{50%{opacity:0}}
.speaker-btn{margin-top:4px;background:none;border:1px solid #3B82F640;color:var(--agent);padding:6px 16px;border-radius:100px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .3s;display:flex;align-items:center;gap:6px}
.speaker-btn:hover{background:#3B82F620;border-color:var(--agent)}

/* CHAT */
.chat-section{max-width:800px;margin:0 auto;padding:40px 24px 24px}
.chat-container{border-radius:20px;background:rgba(255,255,255,.02);border:1px solid var(--border);overflow:hidden;backdrop-filter:blur(20px)}
.chat-header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.chat-avatar{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--agent-dark),var(--agent));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff}
.chat-name{font-size:15px;font-weight:700}
.chat-status{font-size:11px;color:var(--agent);display:flex;align-items:center;gap:5px}
.chat-status::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--agent);display:inline-block;animation:statusPulse 2s ease-in-out infinite}
@keyframes statusPulse{0%,100%{opacity:1}50%{opacity:.4}}
.chat-messages{padding:24px;min-height:200px;max-height:400px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.msg{max-width:85%;padding:14px 18px;border-radius:14px;font-size:14px;line-height:1.7;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-agent{background:rgba(255,255,255,.04);border-left:3px solid var(--agent);align-self:flex-start;border-radius:4px 14px 14px 14px}
.msg-user{background:#3B82F615;border:1px solid #3B82F625;align-self:flex-end;border-radius:14px 14px 4px 14px}
.msg-result{align-self:flex-start;max-width:95%;width:100%}
.result-toggle{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.result-toggle summary{padding:10px 16px;font-size:13px;color:var(--gray-400);cursor:pointer;font-family:'SF Mono','Fira Code',monospace}
.result-toggle pre{padding:16px;font-family:'SF Mono','Fira Code',monospace;font-size:12px;line-height:1.6;color:var(--gray-300);overflow-x:auto;white-space:pre-wrap;word-break:break-word;border-top:1px solid var(--border);margin:0}
.chat-input-area{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:center}
.chat-mic{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--gray-400);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s;flex-shrink:0}
.chat-mic:hover{background:rgba(255,255,255,0.08);color:var(--white)}
.chat-mic.recording{background:rgba(239,68,68,0.2);border-color:rgba(239,68,68,0.5);color:#ef4444;animation:micPulse 1s ease-in-out infinite}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}
.chat-input{flex:1;padding:12px 18px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--white);font-size:14px;font-family:inherit;outline:none;transition:border-color .3s}
.chat-input:focus{border-color:#3B82F650}
.chat-input::placeholder{color:var(--gray-600)}
.chat-send{padding:12px 24px;border-radius:12px;background:linear-gradient(135deg,var(--agent-dark),var(--agent));color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .3s;font-family:inherit}
.chat-send:hover{box-shadow:0 4px 20px #3B82F640}
.chat-send:disabled{opacity:.5;cursor:not-allowed}

/* QUICK ACTIONS */
.actions-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;padding:24px 24px 0}
.action-pill{padding:10px 20px;border-radius:100px;background:var(--glass);border:1px solid var(--border);color:var(--gray-300);font-size:13px;font-weight:500;cursor:pointer;transition:all .3s;font-family:inherit}
.action-pill:hover{background:#3B82F615;border-color:#3B82F640;color:var(--white)}

/* FOOTER */
footer{text-align:center;padding:48px 24px;border-top:1px solid var(--border);margin-top:40px}
.disclaimer{font-size:12px;color:var(--gray-500);margin-bottom:16px;max-width:600px;margin-left:auto;margin-right:auto;line-height:1.6}
footer a{color:var(--gray-400);text-decoration:none;font-size:14px;transition:color .3s}
footer a:hover{color:var(--white)}
.footer-links{display:flex;justify-content:center;gap:28px;margin-bottom:14px}
.footer-cta{display:inline-block;padding:10px 28px;border-radius:12px;background:linear-gradient(135deg,var(--agent-dark),var(--agent));color:#fff;font-weight:600;font-size:13px;text-decoration:none;margin-top:16px;transition:all .3s}
.footer-cta:hover{box-shadow:0 4px 20px #3B82F640}
.footer-badge{color:var(--gray-600);font-size:12px;margin-top:16px}

@media(max-width:768px){
  nav{padding:0 20px}
  .nav-links{display:none}
  .brain-section{height:40vh;min-height:300px}
  .agent-info-section{padding:32px 16px 24px}
  .agent-name{font-size:24px}
  .agent-identity{gap:12px}
  .agent-orb{width:40px;height:40px}
  .chat-section{padding:24px 16px}
}
</style>

<!-- Vanta.js TOPOLOGY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.topology.min.js"></script>

<script>
// ─── AGENT CONFIG ───
const AGENT = {
  name: "Guardian",
  greeting: "I am Guardian. I protect what matters most \u2014 your digital presence. What would you like me to scan?",
  color: '#3B82F6',
  apiBase: 'https://api.silkweb.io/agents/aegis',
  ttsEndpoint: 'https://api.silkweb.io/api/v1/tts/tMXujoAjiboschVOhAnk'
};

// ─── VANTA TOPOLOGY ───
let vantaEffect = null;
let brainState = 'idle'; // idle | thinking | speaking | listening
let animFrame = null;

function initVanta() {
  vantaEffect = VANTA.TOPOLOGY({
    el: "#brainSection",
    mouseControls: true,
    touchControls: true,
    gyroControls: false,
    minHeight: 400,
    minWidth: 200,
    scale: 1.0,
    scaleMobile: 1.0,
    backgroundColor: 0x000000,
    color: 0x2266aa
  });
  startBrainAnimation();
}

// ─── BRAIN STATE ANIMATIONS ───
// TOPOLOGY color cycling + pulse overlay for state changes
let brainTime = 0;
const pulseEl = document.getElementById('brainPulse');

function startBrainAnimation() {
  function tick() {
    animFrame = requestAnimationFrame(tick);
    brainTime += 0.016;
    if (!vantaEffect) return;

    switch (brainState) {
      case 'speaking': {
        // Rapid color cycling — alive, pulsing
        const pulse = Math.sin(brainTime * 6) * 0.5 + 0.5;
        const r = Math.floor(0x22 + pulse * 0x66);
        const g = Math.floor(0x55 + pulse * 0x66);
        const b = Math.floor(0x99 + pulse * 0x44);
        vantaEffect.setOptions({ color: (r << 16) | (g << 8) | b });
        pulseEl.className = 'brain-pulse-overlay speaking';
        break;
      }
      case 'thinking': {
        // Very fast cycling — electric
        const fast = Math.sin(brainTime * 12) * 0.5 + 0.5;
        const r = Math.floor(0x44 + fast * 0x77);
        const g = Math.floor(0x44 + fast * 0x77);
        const b = Math.floor(0xdd + fast * 0x22);
        vantaEffect.setOptions({ color: (r << 16) | (g << 8) | b });
        pulseEl.className = 'brain-pulse-overlay thinking';
        break;
      }
      case 'listening': {
        // Dim, contracted
        const calm = Math.sin(brainTime * 1.5) * 0.5 + 0.5;
        const c = Math.floor(0x11 + calm * 0x15);
        vantaEffect.setOptions({ color: (c << 16) | ((c + 0x22) << 8) | (c + 0x55) });
        pulseEl.className = 'brain-pulse-overlay';
        break;
      }
      case 'idle':
      default: {
        // Gentle color breathing
        const breathe = Math.sin(brainTime * 1.0) * 0.5 + 0.5;
        const r = Math.floor(0x1a + breathe * 0x18);
        const g = Math.floor(0x44 + breathe * 0x22);
        const b = Math.floor(0x88 + breathe * 0x22);
        vantaEffect.setOptions({ color: (r << 16) | (g << 8) | b });
        pulseEl.className = 'brain-pulse-overlay';
        break;
      }
    }
  }
  tick();
}

function setBrainState(state) {
  brainState = state;
}

// ─── TTS (ElevenLabs via proxy) ───
let currentAudio = null;

async function speakTTS(text) {
  setBrainState('speaking');
  try {
    const resp = await fetch(AGENT.ttsEndpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: text,
        model_id: 'eleven_multilingual_v2',
        voice_settings: { stability: 0.5, similarity_boost: 0.75 }
      })
    });
    if (resp.ok) {
      const blob = await resp.blob();
      if (currentAudio) { currentAudio.pause(); currentAudio = null; }
      currentAudio = new Audio(URL.createObjectURL(blob));
      currentAudio.onended = () => { setBrainState('idle'); currentAudio = null; };
      currentAudio.play().catch(() => { setBrainState('idle'); });
      return;
    }
  } catch (e) {
    console.warn('TTS error:', e);
  }
  // Fallback to Web Speech API
  if (window.speechSynthesis) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.pitch = 0.8;
    u.rate = 0.9;
    u.onend = () => setBrainState('idle');
    speechSynthesis.speak(u);
  } else {
    setBrainState('idle');
  }
}

// ─── TYPE TEXT ANIMATION ───
function typeText(el, text, cb) {
  let i = 0;
  el.textContent = '';
  const cursor = document.createElement('span');
  cursor.className = 'typing-cursor';
  el.appendChild(cursor);
  function frame() {
    if (i < text.length) {
      el.textContent = text.substring(0, i + 1);
      el.appendChild(cursor);
      i++;
      setTimeout(frame, 30);
    } else {
      cursor.remove();
      if (cb) cb();
    }
  }
  frame();
}

// ─── TYPE TEXT IN CHAT MESSAGE ───
function typeTextInChat(el, text) {
  return new Promise(resolve => {
    let i = 0;
    el.textContent = '';
    const cursor = document.createElement('span');
    cursor.className = 'typing-cursor';
    el.appendChild(cursor);
    function frame() {
      if (i < text.length) {
        el.textContent = text.substring(0, i + 1);
        el.appendChild(cursor);
        i++;
        messagesEl.scrollTop = messagesEl.scrollHeight;
        setTimeout(frame, 20);
      } else {
        cursor.remove();
        resolve();
      }
    }
    frame();
  });
}

// ─── HELPERS: extract URL and domain from user text ───
function extractURL(text) {
  const match = text.match(/https?:\/\/[^\s,;)}\]]+/i);
  return match ? match[0] : null;
}

function extractDomain(text) {
  // Try to pull a URL first and get host
  const url = extractURL(text);
  if (url) {
    try { return new URL(url).hostname; } catch(e) {}
  }
  // Look for domain-like patterns
  const domainMatch = text.match(/([a-z0-9](?:[a-z0-9-]*[a-z0-9])?\.)+[a-z]{2,}/i);
  return domainMatch ? domainMatch[0] : null;
}

function detectEndpoint(text) {
  const lower = text.toLowerCase();
  const url = extractURL(text);

  if (url) {
    return { path: '/scan/url', body: { url: url } };
  }
  if (lower.includes('ssl')) {
    const domain = extractDomain(text);
    return { path: '/scan/ssl', body: { domain: domain || 'example.com' } };
  }
  if (lower.includes('domain') || lower.includes('reputation')) {
    const domain = extractDomain(text);
    return { path: '/scan/domain', body: { domain: domain || 'example.com' } };
  }
  // Default: full report
  const domain = extractDomain(text);
  return { path: '/report', body: { domain: domain || 'example.com' } };
}

// ─── VOICE INPUT ───
const micBtn = document.getElementById('micBtn');
let recognition = null;
let isRecording = false;

window.toggleVoice = function() {
  console.log('Mic clicked');

  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Voice input not supported in this browser. Please use Chrome.');
    return;
  }

  if (isRecording) {
    recognition.stop();
    return;
  }

  // Request mic permission first
  navigator.mediaDevices.getUserMedia({ audio: true }).then(() => {
    console.log('Mic permission granted');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'en-US';
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {
      console.log('Recording started');
      isRecording = true;
      micBtn.classList.add('recording');
      setBrainState('listening');
      inputEl.placeholder = 'Listening...';
    };

    recognition.onresult = (event) => {
      let transcript = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        transcript += event.results[i][0].transcript;
      }
      console.log('Heard:', transcript);
      inputEl.value = transcript;

      if (event.results[event.results.length - 1].isFinal) {
        setTimeout(() => {
          recognition.stop();
          sendMessage();
        }, 500);
      }
    };

    recognition.onerror = (event) => {
      console.error('Speech error:', event.error);
      isRecording = false;
      micBtn.classList.remove('recording');
      setBrainState('idle');
      inputEl.placeholder = 'Ask Guardian anything... or tap the mic';
      if (event.error === 'not-allowed') {
        alert('Microphone access denied. Please allow microphone in your browser settings.');
      }
    };

    recognition.onend = () => {
      console.log('Recording ended');
      isRecording = false;
      micBtn.classList.remove('recording');
      if (brainState === 'listening') setBrainState('idle');
      inputEl.placeholder = 'Ask Guardian anything... or tap the mic';
    };

    recognition.start();
  }).catch(err => {
    console.error('Mic permission error:', err);
    alert('Microphone access denied. Please allow microphone access and try again.');
  });
}

// ─── CHAT ───
const messagesEl = document.getElementById('chatMessages');
const inputEl = document.getElementById('chatInput');
const sendBtn = document.getElementById('chatSend');

function addUserMessage(text) {
  const m = document.createElement('div');
  m.className = 'msg msg-user';
  m.textContent = text;
  messagesEl.appendChild(m);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function createAgentMessage() {
  const m = document.createElement('div');
  m.className = 'msg msg-agent';
  m.innerHTML = '<span class="typing-cursor"></span>';
  messagesEl.appendChild(m);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return m;
}

function addResult(data) {
  const m = document.createElement('div');
  m.className = 'msg msg-result';
  const details = document.createElement('details');
  details.className = 'result-toggle';
  const summary = document.createElement('summary');
  summary.textContent = 'View JSON Response';
  const pre = document.createElement('pre');
  pre.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
  details.appendChild(summary);
  details.appendChild(pre);
  m.appendChild(details);
  messagesEl.appendChild(m);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function summarizeResult(data) {
  // Try to extract a human-readable summary from the API response
  if (typeof data === 'string') return data;
  if (data.summary) return data.summary;
  if (data.message) return data.message;
  if (data.result && typeof data.result === 'string') return data.result;
  if (data.error) return 'Error: ' + data.error;

  // Build a brief summary from known fields
  const parts = [];
  if (data.domain) parts.push('Domain: ' + data.domain);
  if (data.url) parts.push('URL: ' + data.url);
  if (data.status) parts.push('Status: ' + data.status);
  if (data.grade) parts.push('Grade: ' + data.grade);
  if (data.score !== undefined) parts.push('Score: ' + data.score);
  if (data.risk_level) parts.push('Risk: ' + data.risk_level);
  if (data.threats && Array.isArray(data.threats)) parts.push('Threats found: ' + data.threats.length);
  if (data.ssl && data.ssl.valid !== undefined) parts.push('SSL Valid: ' + data.ssl.valid);

  if (parts.length > 0) return 'Analysis complete. ' + parts.join('. ') + '.';
  return 'Analysis complete. See the full JSON results above for details.';
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  sendBtn.disabled = true;

  addUserMessage(text);
  setBrainState('thinking');

  const endpoint = detectEndpoint(text);
  const url = AGENT.apiBase + endpoint.path;

  try {
    const resp = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-API-Key': 'sw_demo_silkweb_public_agent_preview_2026'
      },
      body: JSON.stringify(endpoint.body)
    });

    const data = await resp.json();

    // Show collapsible JSON
    addResult(data);

    // Generate summary and type it out
    const summary = summarizeResult(data);
    const agentMsg = createAgentMessage();
    setBrainState('speaking');
    await typeTextInChat(agentMsg, summary);

    // Speak the summary via TTS
    speakTTS(summary);

  } catch (e) {
    console.warn('API error:', e);
    const agentMsg = createAgentMessage();
    const fallback = 'I received your request for "' + text + '" targeting ' + url + '. The scan endpoint is being provisioned. In production, I would return full security analysis here.';
    setBrainState('speaking');
    await typeTextInChat(agentMsg, fallback);
    speakTTS(fallback);
  }

  sendBtn.disabled = false;
}

}
