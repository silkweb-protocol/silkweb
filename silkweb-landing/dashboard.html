<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — SilkWeb AI Search Engine</title>
<meta name="theme-color" content="#06060b">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='none' stroke='%236366f1' stroke-width='1'/%3E%3Ccircle cx='16' cy='16' r='8' fill='none' stroke='%236366f1' stroke-width='0.8'/%3E%3Ccircle cx='16' cy='16' r='3' fill='none' stroke='%23818cf8' stroke-width='0.6'/%3E%3Cline x1='16' y1='2' x2='16' y2='30' stroke='%236366f1' stroke-width='0.5'/%3E%3Cline x1='2' y1='16' x2='30' y2='16' stroke='%236366f1' stroke-width='0.5'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #06060b;
  --bg-card: rgba(15, 15, 25, 0.6);
  --bg-input: rgba(15, 15, 25, 0.6);
  --border: rgba(99, 102, 241, 0.15);
  --border-hover: rgba(99, 102, 241, 0.4);
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-muted: #64748b;
  --purple: #6366f1;
  --purple-light: #818cf8;
  --purple-glow: rgba(99, 102, 241, 0.15);
  --green: #10B981;
  --green-glow: rgba(16, 185, 129, 0.15);
  --red: #ef4444;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --max-w: 900px;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

/* ── Nav ── */
.dash-nav {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2rem;
  height: 60px;
  background: rgba(6, 6, 11, 0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.dash-nav .logo {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  text-decoration: none;
  color: var(--text);
}

.dash-nav .logo svg { width: 24px; height: 24px; }
.dash-nav .logo span { font-weight: 600; font-size: 0.95rem; }

.dash-nav .nav-right {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.user-badge {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.85rem;
  color: var(--text-dim);
}

.user-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--purple);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 0.8rem;
  color: #fff;
}

.btn-signout {
  padding: 0.4rem 0.9rem;
  font-size: 0.8rem;
  font-weight: 500;
  font-family: var(--font);
  color: var(--text-dim);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-signout:hover {
  color: var(--text);
  border-color: var(--border-hover);
}

/* ── Main ── */
.dash-main {
  position: relative;
  z-index: 1;
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

.welcome {
  margin-bottom: 2rem;
}

.welcome h1 {
  font-size: 1.75rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 0.25rem;
}

.welcome p {
  color: var(--text-dim);
  font-size: 0.95rem;
}

.tier-badge {
  display: inline-block;
  padding: 0.15rem 0.6rem;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-radius: 20px;
  margin-left: 0.5rem;
  vertical-align: middle;
}

.tier-badge.free { background: rgba(99, 102, 241, 0.15); color: var(--purple-light); }
.tier-badge.pro { background: rgba(16, 185, 129, 0.15); color: var(--green); }
.tier-badge.unlimited { background: rgba(234, 179, 8, 0.15); color: #fbbf24; }

/* ── Cards ── */
.cards-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.25rem;
  margin-bottom: 1.5rem;
}

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.5rem;
  backdrop-filter: blur(10px);
  transition: border-color 0.2s;
}

.card:hover { border-color: var(--border-hover); }

.card-label {
  display: block;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 0.75rem;
}

.card.full-width {
  grid-column: 1 / -1;
}

/* ── API Key Card ── */
.api-key-display {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.api-key-value {
  flex: 1;
  font-family: var(--mono);
  font-size: 0.85rem;
  color: var(--purple-light);
  background: rgba(6, 6, 11, 0.5);
  padding: 0.6rem 0.9rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  user-select: all;
}

.btn-copy, .btn-regen {
  padding: 0.5rem 0.75rem;
  font-size: 0.8rem;
  font-weight: 500;
  font-family: var(--font);
  color: var(--text-dim);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.btn-copy:hover, .btn-regen:hover {
  color: var(--text);
  border-color: var(--border-hover);
}

.btn-copy.copied {
  color: var(--green);
  border-color: var(--green);
}

/* ── Usage Card ── */
.usage-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 0.5rem;
}

.usage-count {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.usage-count span { color: var(--text-muted); font-weight: 400; font-size: 1rem; }

.usage-limit {
  font-size: 0.85rem;
  color: var(--text-muted);
}

.progress-track {
  width: 100%;
  height: 8px;
  background: rgba(255,255,255,0.05);
  border-radius: 4px;
  overflow: hidden;
  margin-top: 0.5rem;
}

.progress-bar {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--purple), var(--purple-light));
  transition: width 0.5s ease;
}

.progress-bar.warning { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
.progress-bar.danger { background: linear-gradient(90deg, #ef4444, #f87171); }

/* ── Agents Grid ── */
.agents-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.75rem;
}

.agents-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 0.75rem;
}

.agent-card {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 1rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  text-decoration: none;
  color: var(--text);
  transition: all 0.2s;
}

.agent-card:hover {
  border-color: var(--border-hover);
  transform: translateY(-2px);
}

.agent-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: var(--purple-glow);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--purple-light);
  flex-shrink: 0;
  font-family: var(--mono);
}

.agent-info .agent-name {
  font-size: 0.85rem;
  font-weight: 600;
}

.agent-info .agent-status {
  font-size: 0.7rem;
  color: var(--text-muted);
}

.agent-info .agent-status.online { color: var(--green); }

/* ── Activity ── */
.activity-list {
  list-style: none;
}

.activity-list li {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.75rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.85rem;
}

.activity-list li:last-child { border-bottom: none; }

.activity-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--purple);
  flex-shrink: 0;
}

.activity-time {
  margin-left: auto;
  font-size: 0.75rem;
  color: var(--text-muted);
  font-family: var(--mono);
}

.empty-state {
  text-align: center;
  padding: 2rem;
  color: var(--text-muted);
  font-size: 0.9rem;
}

/* ── Responsive ── */
@media (max-width: 640px) {
  .cards-grid { grid-template-columns: 1fr; }
  .dash-nav { padding: 0 1rem; }
  .dash-main { padding: 1.5rem 1rem 3rem; }
  .api-key-display { flex-wrap: wrap; }
  .api-key-value { width: 100%; }
  .agents-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Nav -->
<nav class="dash-nav">
  <a href="/" class="logo">
    <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" stroke="#6366f1" stroke-width="1"/><circle cx="16" cy="16" r="8" stroke="#6366f1" stroke-width="0.8"/><circle cx="16" cy="16" r="3" stroke="#818cf8" stroke-width="0.6"/><line x1="16" y1="2" x2="16" y2="30" stroke="#6366f1" stroke-width="0.5"/><line x1="2" y1="16" x2="30" y2="16" stroke="#6366f1" stroke-width="0.5"/></svg>
    <span>SilkWeb</span>
  </a>
  <div class="nav-right">
    <div class="user-badge">
      <div class="user-avatar" id="user-avatar">?</div>
      <span id="user-name-nav">Loading...</span>
    </div>
    <button class="btn-signout" onclick="signOut()">Sign Out</button>
  </div>
</nav>

<main class="dash-main">
  <!-- Welcome -->
  <div class="welcome">
    <h1>Welcome, <span id="user-name">...</span><span class="tier-badge free" id="tier-badge">FREE</span></h1>
    <p>Manage your API access and monitor usage</p>
  </div>

  <!-- Top cards -->
  <div class="cards-grid">
    <!-- API Key -->
    <div class="card full-width">
      <span class="card-label">Your API Key</span>
      <div class="api-key-display">
        <div class="api-key-value" id="api-key-value">Loading...</div>
        <button class="btn-copy" id="btn-copy" onclick="copyApiKey()">Copy</button>
        <button class="btn-regen" onclick="regenerateKey()">Regenerate</button>
      </div>
    </div>

    <!-- Usage -->
    <div class="card">
      <span class="card-label">Today's Usage</span>
      <div class="usage-header">
        <div class="usage-count"><span id="usage-count">0</span> <span>/ <span id="usage-limit">50</span></span></div>
        <div class="usage-limit">requests</div>
      </div>
      <div class="progress-track">
        <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
      </div>
    </div>

    <!-- Account -->
    <div class="card">
      <span class="card-label">Account</span>
      <div style="font-size:0.9rem; margin-bottom:0.5rem;"><strong>Email:</strong> <span id="user-email" style="color:var(--text-dim)">...</span></div>
      <div style="font-size:0.9rem; margin-bottom:0.5rem;"><strong>Provider:</strong> <span id="user-provider" style="color:var(--text-dim)">...</span></div>
      <div style="font-size:0.9rem;"><strong>Member since:</strong> <span id="user-created" style="color:var(--text-dim)">...</span></div>
    </div>
  </div>

  <!-- Agents -->
  <div class="card full-width" style="margin-bottom:1.5rem">
    <div class="agents-header">
      <span class="card-label" style="margin-bottom:0">Available Agents</span>
    </div>
    <div class="agents-grid" id="agents-grid">
      <div class="empty-state">Loading agents...</div>
    </div>
  </div>

  <!-- Recent Activity -->
  <div class="card full-width">
    <span class="card-label">Recent Activity</span>
    <ul class="activity-list" id="activity-list">
      <li class="empty-state">No activity yet. Make your first API call!</li>
    </ul>
  </div>
</main>

<script>
const API_BASE = window.location.hostname === 'localhost'
  ? 'http://localhost:8000'
  : 'https://api.silkweb.io';

// ── Auth check ──────────────────────────────────────────────────

function getToken() {
  return localStorage.getItem('sw_access_token');
}

function requireAuth() {
  if (!getToken()) {
    window.location.href = '/signin.html';
    return false;
  }
  return true;
}

function signOut() {
  localStorage.removeItem('sw_access_token');
  localStorage.removeItem('sw_refresh_token');
  localStorage.removeItem('sw_api_key');
  localStorage.removeItem('sw_user');
  window.location.href = '/signin.html';
}

// ── API helpers ─────────────────────────────────────────────────

async function authFetch(path, opts = {}) {
  const token = getToken();
  const headers = { ...opts.headers, 'Authorization': `Bearer ${token}` };
  const resp = await fetch(API_BASE + path, { ...opts, headers });

  if (resp.status === 401) {
    // Try refresh
    const refreshed = await tryRefresh();
    if (refreshed) {
      headers['Authorization'] = `Bearer ${getToken()}`;
      return fetch(API_BASE + path, { ...opts, headers });
    }
    signOut();
    return null;
  }
  return resp;
}

async function tryRefresh() {
  const refreshToken = localStorage.getItem('sw_refresh_token');
  if (!refreshToken) return false;

  try {
    const resp = await fetch(API_BASE + '/api/v1/auth/refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: refreshToken }),
    });

    if (!resp.ok) return false;

    const data = await resp.json();
    localStorage.setItem('sw_access_token', data.access_token);
    localStorage.setItem('sw_refresh_token', data.refresh_token);
    localStorage.setItem('sw_api_key', data.api_key);
    localStorage.setItem('sw_user', JSON.stringify(data.user));
    return true;
  } catch {
    return false;
  }
}

// ── Load User ───────────────────────────────────────────────────

async function loadUser() {
  // Start with cached data
  const cached = localStorage.getItem('sw_user');
  if (cached) {
    try { renderUser(JSON.parse(cached)); } catch {}
  }

  // Fetch fresh data
  const resp = await authFetch('/api/v1/auth/me');
  if (!resp) return;

  if (resp.ok) {
    const user = await resp.json();
    localStorage.setItem('sw_user', JSON.stringify(user));
    localStorage.setItem('sw_api_key', user.api_key);
    renderUser(user);
  }
}

function renderUser(user) {
  const name = user.name || user.email.split('@')[0];
  document.getElementById('user-name').textContent = name;
  document.getElementById('user-name-nav').textContent = name;
  document.getElementById('user-avatar').textContent = name.charAt(0).toUpperCase();
  document.getElementById('user-email').textContent = user.email;
  document.getElementById('user-provider').textContent = user.provider;
  document.getElementById('user-created').textContent = new Date(user.created_at).toLocaleDateString();
  document.getElementById('api-key-value').textContent = user.api_key;

  // Tier badge
  const badge = document.getElementById('tier-badge');
  badge.textContent = user.tier.toUpperCase();
  badge.className = 'tier-badge ' + user.tier;

  // Usage
  const used = user.requests_today || 0;
  const limit = user.requests_limit;
  document.getElementById('usage-count').textContent = used;
  document.getElementById('usage-limit').textContent = limit !== null ? limit : 'Unlimited';

  if (limit) {
    const pct = Math.min((used / limit) * 100, 100);
    const bar = document.getElementById('progress-bar');
    bar.style.width = pct + '%';
    bar.className = 'progress-bar' + (pct > 90 ? ' danger' : pct > 70 ? ' warning' : '');
  } else {
    document.getElementById('progress-bar').style.width = '0%';
  }
}

// ── Copy API Key ────────────────────────────────────────────────

function copyApiKey() {
  const key = document.getElementById('api-key-value').textContent;
  navigator.clipboard.writeText(key).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 2000);
  });
}

async function regenerateKey() {
  if (!confirm('Are you sure? Your current API key will stop working immediately.')) return;

  const resp = await authFetch('/api/v1/auth/api-key/regenerate', { method: 'POST' });
  if (!resp) return;

  if (resp.ok) {
    const data = await resp.json();
    document.getElementById('api-key-value').textContent = data.api_key;
    localStorage.setItem('sw_api_key', data.api_key);

    // Update cached user
    const cached = localStorage.getItem('sw_user');
    if (cached) {
      try {
        const user = JSON.parse(cached);
        user.api_key = data.api_key;
        localStorage.setItem('sw_user', JSON.stringify(user));
      } catch {}
    }
  } else {
    alert('Failed to regenerate API key. Please try again.');
  }
}

// ── Load Agents ─────────────────────────────────────────────────

async function loadAgents() {
  try {
    const resp = await fetch(API_BASE + '/agents/list');
    if (!resp.ok) throw new Error();
    const data = await resp.json();
    renderAgents(data.agents || []);
  } catch {
    document.getElementById('agents-grid').innerHTML =
      '<div class="empty-state">Could not load agents</div>';
  }
}

function renderAgents(agents) {
  const grid = document.getElementById('agents-grid');
  if (!agents.length) {
    grid.innerHTML = '<div class="empty-state">No agents available</div>';
    return;
  }

  grid.innerHTML = agents.map(a => `
    <div class="agent-card">
      <div class="agent-icon">${(a.name || '?').substring(0, 2)}</div>
      <div class="agent-info">
        <div class="agent-name">${a.name || a.id}</div>
        <div class="agent-status ${a.status === 'operational' ? 'online' : ''}">${a.status}</div>
      </div>
    </div>
  `).join('');
}

// ── Init ────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  if (!requireAuth()) return;
  loadUser();
  loadAgents();
});
</script>
</body>
</html>
