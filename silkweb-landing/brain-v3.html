<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SilkWeb Brain v3 — Holographic AI Sphere</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    pointer-events: none;
    z-index: 0;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

/* ─── GLSL NOISE ─── */
const noiseGLSL = `
vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise(vec3 v){
  const vec2 C=vec2(1.0/6.0,1.0/3.0);
  const vec4 D=vec4(0.0,0.5,1.0,2.0);
  vec3 i=floor(v+dot(v,C.yyy));
  vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);
  vec3 l=1.0-g;
  vec3 i1=min(g.xyz,l.zxy);
  vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx;
  vec3 x2=x0-i2+C.yyy;
  vec3 x3=x0-D.yyy;
  i=mod289(i);
  vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
  float n_=0.142857142857;
  vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.0*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z);
  vec4 y_=floor(j-7.0*x_);
  vec4 x=x_*ns.x+ns.yyyy;
  vec4 y=y_*ns.x+ns.yyyy;
  vec4 h=1.0-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy);
  vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.0+1.0;
  vec4 s1=floor(b1)*2.0+1.0;
  vec4 sh=-step(h,vec4(0.0));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;
  vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);
  vec3 p1=vec3(a0.zw,h.y);
  vec3 p2=vec3(a1.xy,h.z);
  vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);
  m=m*m;
  return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}
`;

/* ─── SCENE SETUP ─── */
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 0);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 8;

/* ─── POST-PROCESSING ─── */
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.8, 0.5, 0.3
);
composer.addPass(bloomPass);

/* ─── UNIFORMS ─── */
const uniforms = {
  uTime: { value: 0 },
  uDisplacementAmp: { value: 0.15 },
  uCorePulse: { value: 0.2 },
};

/* ─── SPHERE 1: OUTER SHELL ─── */
const outerVertexShader = `
${noiseGLSL}
uniform float uTime;
uniform float uDisplacementAmp;
varying vec3 vNormal;
varying vec3 vPosition;
varying vec3 vWorldPosition;
void main() {
  vNormal = normalize(normalMatrix * normal);
  vec3 pos = position;
  float displacement = uDisplacementAmp * snoise(pos * 1.5 + uTime * 0.1);
  pos += normal * displacement;
  vPosition = pos;
  vec4 worldPos = modelMatrix * vec4(pos, 1.0);
  vWorldPosition = worldPos.xyz;
  gl_Position = projectionMatrix * viewMatrix * worldPos;
}
`;

const outerFragmentShader = `
${noiseGLSL}
uniform float uTime;
varying vec3 vNormal;
varying vec3 vPosition;
varying vec3 vWorldPosition;
void main() {
  vec3 viewDir = normalize(cameraPosition - vWorldPosition);
  vec3 norm = normalize(vNormal);
  float fresnel = pow(1.0 - max(dot(viewDir, norm), 0.0), 2.5);

  float n1 = snoise(vPosition * 3.0 + uTime * 0.05) * 0.5 + 0.5;
  float n2 = snoise(vPosition * 6.0 - uTime * 0.08) * 0.5 + 0.5;
  float n3 = snoise(vPosition * 12.0 + uTime * 0.03) * 0.5 + 0.5;
  float noisePattern = n1 * 0.5 + n2 * 0.3 + n3 * 0.2;

  vec3 coldBlue = vec3(0.4, 0.6, 0.8);
  vec3 iceWhite = vec3(0.85, 0.92, 1.0);
  vec3 color = mix(coldBlue, iceWhite, fresnel);
  color += noisePattern * 0.08 * vec3(0.3, 0.5, 0.7);

  float alpha = 0.15 + fresnel * 0.6 + noisePattern * 0.1;
  gl_FragColor = vec4(color, alpha);
}
`;

const outerShellMat = new THREE.ShaderMaterial({
  vertexShader: outerVertexShader,
  fragmentShader: outerFragmentShader,
  uniforms: {
    uTime: uniforms.uTime,
    uDisplacementAmp: uniforms.uDisplacementAmp,
  },
  transparent: true,
  side: THREE.DoubleSide,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});

const outerShell = new THREE.Mesh(
  new THREE.IcosahedronGeometry(2.5, 64),
  outerShellMat
);
scene.add(outerShell);

/* ─── SPHERE 2: INNER CORE ─── */
const coreVertexShader = `
varying vec2 vUv;
void main() {
  vUv = uv;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}
`;

const coreFragmentShader = `
uniform float uCorePulse;
varying vec2 vUv;
void main() {
  float dist = length(vUv - 0.5) * 2.0;
  float glow = 1.0 - dist;
  glow = max(glow, 0.0);
  glow = pow(glow, 1.5);
  vec3 color = vec3(0.9, 0.95, 1.0);
  float alpha = uCorePulse * glow;
  gl_FragColor = vec4(color, alpha);
}
`;

const coreMat = new THREE.ShaderMaterial({
  vertexShader: coreVertexShader,
  fragmentShader: coreFragmentShader,
  uniforms: { uCorePulse: uniforms.uCorePulse },
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});

const core = new THREE.Mesh(new THREE.SphereGeometry(1.2, 48, 48), coreMat);
scene.add(core);

/* ─── SPHERE 3: ATMOSPHERE ─── */
const atmoVertexShader = `
varying vec3 vNormal;
varying vec3 vWorldPosition;
void main() {
  vNormal = normalize(normalMatrix * normal);
  vec4 wp = modelMatrix * vec4(position, 1.0);
  vWorldPosition = wp.xyz;
  gl_Position = projectionMatrix * viewMatrix * wp;
}
`;

const atmoFragmentShader = `
varying vec3 vNormal;
varying vec3 vWorldPosition;
void main() {
  vec3 viewDir = normalize(cameraPosition - vWorldPosition);
  float fresnel = pow(1.0 - max(dot(viewDir, normalize(vNormal)), 0.0), 3.0);
  vec3 color = vec3(0.5, 0.7, 0.9);
  float alpha = 0.05 * fresnel;
  gl_FragColor = vec4(color, alpha);
}
`;

const atmoMat = new THREE.ShaderMaterial({
  vertexShader: atmoVertexShader,
  fragmentShader: atmoFragmentShader,
  transparent: true,
  side: THREE.BackSide,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});

const atmosphere = new THREE.Mesh(new THREE.SphereGeometry(3.2, 48, 48), atmoMat);
scene.add(atmosphere);

/* ─── ORBITAL RINGS ─── */
const ringGroup = new THREE.Group();
scene.add(ringGroup);

const ringMat = new THREE.MeshBasicMaterial({
  color: new THREE.Color(0.5, 0.65, 0.85),
  transparent: true,
  opacity: 0.12,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  side: THREE.DoubleSide,
});

const ringConfigs = [
  { radius: 3.0, tilt: [0.3, 0.2, 0], speed: 0.0005 },
  { radius: 3.4, tilt: [-0.5, 0.8, 0.3], speed: 0.0008 },
  { radius: 2.8, tilt: [0.1, -0.6, 0.5], speed: 0.001 },
];

const rings = ringConfigs.map(cfg => {
  const geo = new THREE.TorusGeometry(cfg.radius, 0.008, 8, 200);
  const mesh = new THREE.Mesh(geo, ringMat.clone());
  mesh.rotation.set(cfg.tilt[0], cfg.tilt[1], cfg.tilt[2]);
  mesh.userData.speed = cfg.speed;
  ringGroup.add(mesh);
  return mesh;
});

/* ─── DUST PARTICLES ─── */
const dustCount = 150;
const dustPositions = new Float32Array(dustCount * 3);
const dustVelocities = [];
for (let i = 0; i < dustCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 2.2 + Math.random() * 1.5;
  dustPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
  dustPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  dustPositions[i * 3 + 2] = r * Math.cos(phi);
  dustVelocities.push({
    x: (Math.random() - 0.5) * 0.001,
    y: (Math.random() - 0.5) * 0.001,
    z: (Math.random() - 0.5) * 0.001,
  });
}

const dustGeo = new THREE.BufferGeometry();
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));

const dustMat = new THREE.PointsMaterial({
  color: new THREE.Color(0.7, 0.8, 0.95),
  size: 0.02,
  transparent: true,
  opacity: 0.3,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true,
});

const dustParticles = new THREE.Points(dustGeo, dustMat);
scene.add(dustParticles);

/* ─── STATE ─── */
let brainState = 'idle';
let targetDisplacement = 0.15;
let currentDisplacement = 0.15;
let pulseTriggered = false;
let pulseDecay = 0;
const mouse = { x: 0, y: 0 };
const targetRotation = { x: 0, y: 0 };
const currentRotation = { x: 0, y: 0 };

/* ─── PUBLIC API ─── */
window.triggerPulse = () => {
  pulseTriggered = true;
  pulseDecay = 0.4;
};

window.setBrainState = (state) => {
  brainState = state;
  switch (state) {
    case 'speaking':
      targetDisplacement = 0.25;
      break;
    case 'thinking':
      targetDisplacement = 0.2;
      break;
    case 'idle':
    default:
      targetDisplacement = 0.15;
      break;
  }
};

/* ─── MOUSE ─── */
document.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

/* ─── RESIZE ─── */
window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
});

/* ─── ANIMATION ─── */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // Time uniform
  uniforms.uTime.value += delta * 0.1;

  // Displacement smoothing + pulse
  if (pulseTriggered) {
    currentDisplacement = pulseDecay;
    pulseDecay *= 0.96;
    if (pulseDecay < targetDisplacement + 0.01) {
      pulseTriggered = false;
    }
  }
  currentDisplacement += (targetDisplacement - currentDisplacement) * 0.02;

  // Speaking mode: add subtle oscillation
  if (brainState === 'speaking') {
    currentDisplacement += Math.sin(elapsed * 4) * 0.03;
  }
  // Thinking mode: slightly faster noise
  if (brainState === 'thinking') {
    uniforms.uTime.value += delta * 0.15;
  }

  uniforms.uDisplacementAmp.value = currentDisplacement;

  // Core pulse (6-second cycle, range 0.15 to 0.25)
  uniforms.uCorePulse.value = 0.2 + Math.sin(elapsed * (Math.PI / 3)) * 0.05;

  // Orbital rings rotation
  rings.forEach(ring => {
    ring.rotation.z += ring.userData.speed;
  });

  // Dust particle drift
  const posArr = dustGeo.attributes.position.array;
  for (let i = 0; i < dustCount; i++) {
    const v = dustVelocities[i];
    posArr[i * 3] += v.x;
    posArr[i * 3 + 1] += v.y;
    posArr[i * 3 + 2] += v.z;

    // Keep particles near sphere surface
    const dx = posArr[i * 3];
    const dy = posArr[i * 3 + 1];
    const dz = posArr[i * 3 + 2];
    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
    if (dist > 4.0 || dist < 2.0) {
      v.x *= -1;
      v.y *= -1;
      v.z *= -1;
    }
  }
  dustGeo.attributes.position.needsUpdate = true;

  // Scene slow rotation
  scene.rotation.y += 0.0003;

  // Mouse tilt (lerped, max 0.15 rad)
  targetRotation.x = mouse.y * 0.15;
  targetRotation.y = mouse.x * 0.15;
  currentRotation.x += (targetRotation.x - currentRotation.x) * 0.03;
  currentRotation.y += (targetRotation.y - currentRotation.y) * 0.03;
  scene.rotation.x = currentRotation.x;

  // We add to scene.rotation.y for mouse without overwriting the slow spin
  // by using a parent group or adjusting camera instead
  camera.position.x = Math.sin(currentRotation.y) * 8;
  camera.position.z = Math.cos(currentRotation.y) * 8;
  camera.position.y = currentRotation.x * 2;
  camera.lookAt(0, 0, 0);

  composer.render();
}

animate();
</script>
</body>
</html>
